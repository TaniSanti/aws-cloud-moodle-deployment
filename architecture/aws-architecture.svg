<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AWS Moodle deployment architecture</title>
<desc>Internet to Elastic IP to Security Group to EC2 Ubuntu instance to Apache and PHP to MySQL to Moodle</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="760" fill="#FFFFFF"/>

<rect x="210" y="30" width="260" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="340" y="52" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Internet</text>
<text x="340" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#444441">External user traffic</text>
<line x1="340" y1="86" x2="340" y2="128" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="128" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
<text x="340" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0C447C">Elastic IP</text>
<text x="340" y="168" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#185FA5">Static public entry point</text>
<line x1="340" y1="184" x2="340" y2="226" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="226" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
<text x="340" y="248" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0C447C">Security group</text>
<text x="340" y="266" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#185FA5">SSH, HTTP, HTTPS rules</text>
<line x1="340" y1="282" x2="340" y2="324" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="324" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="340" y="346" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#085041">EC2 instance (Ubuntu)</text>
<text x="340" y="364" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0F6E56">Compute and Linux OS</text>
<line x1="340" y1="380" x2="340" y2="422" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="422" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="340" y="444" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#085041">Apache + PHP</text>
<text x="340" y="462" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0F6E56">Web server layer</text>
<line x1="340" y1="478" x2="340" y2="520" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="520" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
<text x="340" y="542" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#085041">MySQL</text>
<text x="340" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0F6E56">Database layer</text>
<line x1="340" y1="576" x2="340" y2="618" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="210" y="618" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
<text x="340" y="640" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">Moodle application</text>
<text x="340" y="658" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">Learning management system</text>

<text x="340" y="712" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">Traffic flows top to bottom, inside the AWS Academy Learner Lab VPC</text>
</svg>
